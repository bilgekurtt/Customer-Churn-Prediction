services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./model.pkl:/app/model.pkl
      - ./feature_schema.json:/app/feature_schema.json
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - churn-network

  frontend:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - churn-network

networks:
  churn-network:
    driver: bridge