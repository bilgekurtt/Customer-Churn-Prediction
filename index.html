<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Churn Prediction</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border: 1px solid #ddd;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 30px;
            color: #333;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

            .form-group.full-width {
                grid-column: 1 / -1;
            }

        label {
            margin-bottom: 5px;
            color: #333;
            font-size: 14px;
        }

        input, select {
            padding: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

            input:focus, select:focus {
                outline: none;
                border-color: #666;
            }

        .services-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            background: #fafafa;
        }

            .services-section h3 {
                font-size: 16px;
                margin-bottom: 15px;
                color: #333;
            }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
        }

            .checkbox-group input[type="checkbox"] {
                width: auto;
                margin-right: 8px;
            }

            .checkbox-group label {
                margin: 0;
                cursor: pointer;
            }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            background: #333;
            color: white;
            font-size: 14px;
            cursor: pointer;
            margin-top: 20px;
        }

            button:hover {
                background: #555;
            }

            button:disabled {
                opacity: 0.6;
                cursor: not-allowed;
            }

        .result {
            margin-top: 30px;
            padding: 20px;
            border: 1px solid #ddd;
            display: none;
        }

            .result.show {
                display: block;
            }

            .result h2 {
                font-size: 18px;
                margin-bottom: 15px;
                color: #333;
            }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

            .result-item:last-child {
                border-bottom: none;
            }

        .metrics {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #ddd;
        }

            .metrics h3 {
                font-size: 16px;
                margin-bottom: 10px;
                color: #333;
            }

        .error {
            margin-top: 20px;
            padding: 15px;
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            display: none;
        }

            .error.show {
                display: block;
            }
    </style>
</head>
<body>
    <div class="container">
        <h1>Customer Churn Prediction</h1>

        <form id="predictionForm">
            <div class="form-grid">
                <div class="form-group">
                    <label for="tenure">Tenure (months)</label>
                    <input type="number" id="tenure" name="tenure" value="12" min="0" required>
                </div>

                <div class="form-group">
                    <label for="MonthlyCharges">Monthly Charges ($)</label>
                    <input type="number" id="MonthlyCharges" name="MonthlyCharges" value="70" step="0.01" min="0" required>
                </div>

                <div class="form-group">
                    <label for="TotalCharges">Total Charges ($)</label>
                    <input type="number" id="TotalCharges" name="TotalCharges" value="840" step="0.01" min="0" required>
                </div>

                <div class="form-group">
                    <label for="Contract">Contract Type</label>
                    <select id="Contract" name="Contract" required>
                        <option value="Month-to-month">Month-to-month</option>
                        <option value="One year">One year</option>
                        <option value="Two year">Two year</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="InternetService">Internet Service</label>
                    <select id="InternetService" name="InternetService" required>
                        <option value="DSL">DSL</option>
                        <option value="Fiber optic">Fiber optic</option>
                        <option value="No">No</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="PaymentMethod">Payment Method</label>
                    <select id="PaymentMethod" name="PaymentMethod" required>
                        <option value="Electronic check">Electronic check</option>
                        <option value="Mailed check">Mailed check</option>
                        <option value="Bank transfer (automatic)">Bank transfer (automatic)</option>
                        <option value="Credit card (automatic)">Credit card (automatic)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="SeniorCitizen">Senior Citizen</label>
                    <select id="SeniorCitizen" name="SeniorCitizen" required>
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="Partner">Has Partner</label>
                    <select id="Partner" name="Partner" required>
                        <option value="Yes">Yes</option>
                        <option value="No">No</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="Dependents">Has Dependents</label>
                    <select id="Dependents" name="Dependents" required>
                        <option value="Yes">Yes</option>
                        <option value="No">No</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="PaperlessBilling">Paperless Billing</label>
                    <select id="PaperlessBilling" name="PaperlessBilling" required>
                        <option value="Yes">Yes</option>
                        <option value="No">No</option>
                    </select>
                </div>
            </div>

            <div class="services-section">
                <h3>Services</h3>
                <div class="services-grid">
                    <div class="checkbox-group">
                        <input type="checkbox" id="PhoneService" name="PhoneService" checked>
                        <label for="PhoneService">Phone Service</label>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="MultipleLines" name="MultipleLines">
                        <label for="MultipleLines">Multiple Lines</label>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="OnlineSecurity" name="OnlineSecurity">
                        <label for="OnlineSecurity">Online Security</label>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="OnlineBackup" name="OnlineBackup">
                        <label for="OnlineBackup">Online Backup</label>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="DeviceProtection" name="DeviceProtection">
                        <label for="DeviceProtection">Device Protection</label>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="TechSupport" name="TechSupport">
                        <label for="TechSupport">Tech Support</label>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="StreamingTV" name="StreamingTV">
                        <label for="StreamingTV">Streaming TV</label>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="StreamingMovies" name="StreamingMovies">
                        <label for="StreamingMovies">Streaming Movies</label>
                    </div>
                </div>
            </div>

            <button type="submit" id="predictBtn">Predict</button>
        </form>

        <div id="error" class="error"></div>

        <div id="result" class="result">
            <h2>Prediction Results</h2>
            <div class="result-item">
                <span>Prediction:</span>
                <strong id="prediction"></strong>
            </div>
            <div class="result-item">
                <span>Churn Probability:</span>
                <strong id="probability"></strong>
            </div>
            <div class="result-item">
                <span>Response Time:</span>
                <strong id="responseTime"></strong>
            </div>

            <div class="metrics">
                <h3>API Metrics</h3>
                <div class="result-item">
                    <span>Total Requests:</span>
                    <strong id="requestCount">-</strong>
                </div>
                <div class="result-item">
                    <span>Average Response Time:</span>
                    <strong id="avgResponseTime">-</strong>
                </div>
            </div>
        </div>
    </div>

    <script>
        // API base URL - change this if your API is on a different host/port
        const API_BASE = 'http://localhost:8000';

        document.getElementById('predictionForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('predictBtn');
            const result = document.getElementById('result');
            const error = document.getElementById('error');

            // Hide previous results
            result.classList.remove('show');
            error.classList.remove('show');

            // Disable button and show loading
            btn.disabled = true;
            btn.textContent = 'Loading...';

            try {
                // Collect form data
                const formData = new FormData(e.target);
                const data = {};

                // Handle standard inputs
                formData.forEach((value, key) => {
                    if (['tenure', 'MonthlyCharges', 'TotalCharges', 'SeniorCitizen'].includes(key)) {
                        data[key] = parseFloat(value);
                    } else {
                        data[key] = value;
                    }
                });

                // Handle service checkboxes
                const services = ['PhoneService', 'MultipleLines', 'OnlineSecurity', 'OnlineBackup',
                    'DeviceProtection', 'TechSupport', 'StreamingTV', 'StreamingMovies'];

                let serviceCount = 0;
                services.forEach(service => {
                    const checkbox = document.getElementById(service);
                    data[service] = checkbox.checked ? 'Yes' : 'No';
                    if (checkbox.checked) serviceCount++;
                });

                // Add calculated fields
                data.num_services = serviceCount;
                data.tenure_contract_ratio = data.tenure / 12;

                // Determine tenure_group
                if (data.tenure <= 12) {
                    data.tenure_group = '0-12';
                } else if (data.tenure <= 24) {
                    data.tenure_group = '12-24';
                } else if (data.tenure <= 48) {
                    data.tenure_group = '24-48';
                } else {
                    data.tenure_group = '48+';
                }

                // Make API request
                const response = await fetch(`${API_BASE}/api/predict`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify([data])
                });

                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }

                const result_data = await response.json();

                // Display results
                await displayResults(result_data);

            } catch (err) {
                error.textContent = `Error: ${err.message}. Make sure the API is running on ${API_BASE}`;
                error.classList.add('show');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Predict';
            }
        });

        async function displayResults(data) {
            const result = document.getElementById('result');
            const prediction = data.predictions[0];
            const probability = data.probabilities[0];
            const responseTime = data.response_time;

            // Update result elements
            document.getElementById('prediction').textContent = prediction === 1 ? 'Will Churn' : 'Will Not Churn';
            document.getElementById('probability').textContent = `${(probability * 100).toFixed(2)}%`;
            document.getElementById('responseTime').textContent = `${(responseTime * 1000).toFixed(2)} ms`;

            // Fetch and display metrics
            try {
                const metricsResponse = await fetch(`${API_BASE}/api/metrics`);
                if (metricsResponse.ok) {
                    const metricsData = await metricsResponse.json();
                    document.getElementById('requestCount').textContent = metricsData.request_count;
                    document.getElementById('avgResponseTime').textContent =
                        `${(metricsData.average_response_time * 1000).toFixed(2)} ms`;
                }
            } catch (err) {
                console.error('Error fetching metrics:', err);
            }

            result.classList.add('show');
        }
    </script>
</body>
</html>
